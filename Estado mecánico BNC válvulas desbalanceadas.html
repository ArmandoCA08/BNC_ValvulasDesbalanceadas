<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<style>
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        font-family: Arial, sans-serif;
    }

    #contenedor {
        width: 100%;
        height: 100%;
        box-sizing: border-box;
        border: 1px solid #000000;
        background: transparent;
    }

    svg {
        width: 100%;
        height: 100%;
        display: block;
        background: transparent;
    }

    .titulo {
        font-size: 22px;
        font-weight: bold;
        fill: #111827;
    }

    .tree-line {
        stroke: #111827;
        stroke-width: 5.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
    }

    .tree-body {
        fill: #d1d5db;
        stroke: #111827;
        stroke-width: 3;
    }

    .tree-dark {
        fill: #9ca3af;
        stroke: #111827;
        stroke-width: 3;
    }

    .tree-valve {
        fill: #ffffff;
        stroke: #111827;
        stroke-width: 3;
    }

    .tp {
        stroke: #111827;
        stroke-width: 4;
        stroke-linecap: round;
    }

    .grid-pozo {
        stroke: #9ca3af;
        stroke-width: 1.3;
        stroke-dasharray: 7 7;
    }

    .grid-valvula {
        stroke: #10b981;
        stroke-width: 1.8;
        stroke-dasharray: 8 7;
    }

    .valvula {
        fill: #facc15;
        stroke: #111827;
        stroke-width: 1.6;
    }

    .etqProf {
        font-size: 15px;
        fill: #4b5563;
        font-weight: 600;
    }

    .etqValv {
        font-size: 15px;
        font-weight: bold;
        fill: #111827;
    }

    .sinDatos {
        font-size: 16px;
        fill: #9ca3af;
        font-weight: 600;
    }
</style>
</head>

<body>
<div id="contenedor"></div>

<script>
    // CONFIGURACIÓN GENERAL
    const ancho = 560;
    const alto = 920;

    const xCentro = 280;

    // Título
    const yTitulo = 30;

    // Árbol de producción
    const arbolY = 48;

    // TP centrada
    const xTP1 = 272;
    const xTP2 = 288;
    const xCentroTP = (xTP1 + xTP2) / 2;

    // La TP inicia debajo del árbol
    const yInicioTP = 190;
    const yFondoTP = 890;

    // Válvula centrada dentro de la TP
    const anchoValvula = 28;
    const altoValvula = 16;

    function crearSVG(tag, attrs = {}) {
        const el = document.createElementNS("http://www.w3.org/2000/svg", tag);

        Object.entries(attrs).forEach(([k, v]) => {
            el.setAttribute(k, v);
        });

        return el;
    }

    function renderEstadoMecanico(data) {
        const contenedor = document.getElementById("contenedor");
        contenedor.innerHTML = "";

        const profundidadMax = Number(data?.profundidadMax || 8000);
        const rawValvulas = Array.isArray(data?.valvulas) ? data.valvulas : [];

        // Acepta dos formatos:
        // 1) [{numero:1, profundidad:2000}]
        // 2) [[1, 2000]]
        const valvulas = rawValvulas.map((v, i) => {
            if (Array.isArray(v)) {
                return {
                    numero: Number(v[0]),
                    profundidad: Number(v[1])
                };
            }

            return {
                numero: Number(v.numero ?? i + 1),
                profundidad: Number(v.profundidad)
            };
        }).filter(v => Number.isFinite(v.numero) && Number.isFinite(v.profundidad));

        const altoPozo = yFondoTP - yInicioTP;

        function yProf(prof) {
            return yInicioTP + (Number(prof) / profundidadMax) * altoPozo;
        }

        const svg = crearSVG("svg", {
            viewBox: `0 0 ${ancho} ${alto}`,
            preserveAspectRatio: "none"
        });

        // TÍTULO
        const titulo = crearSVG("text", {
            x: xCentro,
            y: yTitulo,
            "text-anchor": "middle",
            class: "titulo"
        });
        titulo.textContent = "Estado mecánico";
        svg.appendChild(titulo);

        // ÁRBOL DE PRODUCCIÓN DIBUJADO EN SVG
        dibujarArbolProduccion(svg);

        // TP: dos líneas verticales
        svg.appendChild(crearSVG("line", {
            x1: xTP1,
            y1: yInicioTP,
            x2: xTP1,
            y2: yFondoTP,
            class: "tp"
        }));

        svg.appendChild(crearSVG("line", {
            x1: xTP2,
            y1: yInicioTP,
            x2: xTP2,
            y2: yFondoTP,
            class: "tp"
        }));

        // LÍNEAS DE PROFUNDIDAD DEL POZO, COLOR GRIS
        dibujarLineaPozo(svg, yInicioTP, "0 ft");

        const intervalo = 1000;

        for (let p = intervalo; p <= profundidadMax; p += intervalo) {
            dibujarLineaPozo(svg, yProf(p), `${p} ft`);
        }

        if (profundidadMax % intervalo !== 0) {
            dibujarLineaPozo(svg, yFondoTP, `${profundidadMax} ft`);
        }

        // VÁLVULAS, CENTRADAS EN LA TP
        if (valvulas.length === 0) {
            const t = crearSVG("text", {
                x: xCentro,
                y: 520,
                "text-anchor": "middle",
                class: "sinDatos"
            });

            t.textContent = "Sin válvulas calculadas";
            svg.appendChild(t);
        } else {
            valvulas.forEach(v => {
                const numero = Number(v.numero);
                const prof = Number(v.profundidad);
                const y = yProf(prof);

                // Línea guía de la válvula, color verde
                svg.appendChild(crearSVG("line", {
                    x1: 35,
                    y1: y.toFixed(1),
                    x2: 530,
                    y2: y.toFixed(1),
                    class: "grid-valvula"
                }));

                // Válvula centrada dentro de la TP
                svg.appendChild(crearSVG("rect", {
                    x: (xCentroTP - anchoValvula / 2).toFixed(1),
                    y: (y - altoValvula / 2).toFixed(1),
                    width: anchoValvula,
                    height: altoValvula,
                    rx: 3,
                    class: "valvula"
                }));

                // Etiqueta izquierda: Vn | 2000.00 ft
                const etiqueta = crearSVG("text", {
                    x: xTP1 - 18,
                    y: (y + 5).toFixed(1),
                    "text-anchor": "end",
                    class: "etqValv"
                });

                etiqueta.textContent = `V${numero} | ${prof.toFixed(2)} ft`;
                svg.appendChild(etiqueta);
            });
        }

        contenedor.appendChild(svg);
    }

    function dibujarLineaPozo(svg, y, texto) {
        svg.appendChild(crearSVG("line", {
            x1: 35,
            y1: y,
            x2: 530,
            y2: y,
            class: "grid-pozo"
        }));

        const t = crearSVG("text", {
            x: 455,
            y: Number(y) - 9,
            class: "etqProf"
        });

        t.textContent = texto;
        svg.appendChild(t);
    }

    function dibujarArbolProduccion(svg) {
        const y = arbolY;
        const x = xCentro;

        // Línea vertical principal
        svg.appendChild(crearSVG("line", {
            x1: x,
            y1: y + 12,
            x2: x,
            y2: y + 125,
            class: "tree-line"
        }));

        // Ramal horizontal superior
        svg.appendChild(crearSVG("line", {
            x1: x - 75,
            y1: y + 38,
            x2: x + 75,
            y2: y + 38,
            class: "tree-line"
        }));

        // Ramal lateral derecho
        svg.appendChild(crearSVG("line", {
            x1: x,
            y1: y + 88,
            x2: x + 92,
            y2: y + 88,
            class: "tree-line"
        }));

        // Base del árbol
        svg.appendChild(crearSVG("line", {
            x1: x - 65,
            y1: y + 130,
            x2: x + 65,
            y2: y + 130,
            class: "tree-line"
        }));

        // Cuerpo inferior
        svg.appendChild(crearSVG("rect", {
            x: x - 20,
            y: y + 98,
            width: 40,
            height: 30,
            rx: 4,
            class: "tree-body"
        }));

        // Cuerpo medio
        svg.appendChild(crearSVG("rect", {
            x: x - 15,
            y: y + 61,
            width: 30,
            height: 28,
            rx: 4,
            class: "tree-body"
        }));

        // Cuerpo superior
        svg.appendChild(crearSVG("rect", {
            x: x - 14,
            y: y + 18,
            width: 28,
            height: 22,
            rx: 4,
            class: "tree-body"
        }));

        // Bonete superior
        svg.appendChild(crearSVG("circle", {
            cx: x,
            cy: y + 6,
            r: 8,
            class: "tree-dark"
        }));

        // Válvula central superior
        dibujarValvulaArbol(svg, x, y + 50, 13);

        // Válvula izquierda superior
        dibujarValvulaArbol(svg, x - 46, y + 38, 12);

        // Válvula derecha superior
        dibujarValvulaArbol(svg, x + 46, y + 38, 12);

        // Válvula lateral derecha
        dibujarValvulaArbol(svg, x + 62, y + 88, 12);

        // Bloques laterales pequeños
        svg.appendChild(crearSVG("rect", {
            x: x - 93,
            y: y + 28,
            width: 16,
            height: 22,
            rx: 2,
            class: "tree-body"
        }));

        svg.appendChild(crearSVG("rect", {
            x: x + 77,
            y: y + 28,
            width: 16,
            height: 22,
            rx: 2,
            class: "tree-body"
        }));

        svg.appendChild(crearSVG("rect", {
            x: x + 96,
            y: y + 77,
            width: 16,
            height: 22,
            rx: 2,
            class: "tree-body"
        }));

        // Cuello hacia TP
        svg.appendChild(crearSVG("rect", {
            x: x - 11,
            y: y + 130,
            width: 22,
            height: 20,
            rx: 3,
            class: "tree-body"
        }));
    }

    function dibujarValvulaArbol(svg, cx, cy, r) {
        svg.appendChild(crearSVG("circle", {
            cx: cx,
            cy: cy,
            r: r,
            class: "tree-valve"
        }));

        svg.appendChild(crearSVG("line", {
            x1: cx - r * 0.65,
            y1: cy - r * 0.65,
            x2: cx + r * 0.65,
            y2: cy + r * 0.65,
            class: "tree-line"
        }));

        svg.appendChild(crearSVG("line", {
            x1: cx + r * 0.65,
            y1: cy - r * 0.65,
            x2: cx - r * 0.65,
            y2: cy + r * 0.65,
            class: "tree-line"
        }));
    }

    // COMUNICACIÓN CON MATLAB APP DESIGNER
    function setup(htmlComponent) {
        htmlComponent.addEventListener("DataChanged", function () {
            renderEstadoMecanico(htmlComponent.Data);
        });

        renderEstadoMecanico(htmlComponent.Data);
    }

    // Vista inicial si se abre directo en navegador
    renderEstadoMecanico({
        profundidadMax: 8000,
        valvulas: []
    });
</script>
</body>
</html>
